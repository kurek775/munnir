services:
  api:
    build:
      context: .
      dockerfile: munnir-api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./munnir-api/app:/app/app
      - ./munnir-api/alembic:/app/alembic
      - ./munnir-api/tests:/app/tests
      - ./cpp_engine:/app/cpp_engine
      - sqlite-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/munnir.db
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NEWS_SCHEDULER_ENABLED=${NEWS_SCHEDULER_ENABLED:-false}
      - TRADE_FEE_CENTS=${TRADE_FEE_CENTS:-100}
      - SLIPPAGE_ENABLED=${SLIPPAGE_ENABLED:-true}

  ui:
    build:
      context: .
      dockerfile: munnir-ui/Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./munnir-ui/src:/app/src
      - ./munnir-ui/public:/app/public
    depends_on:
      - api

volumes:
  sqlite-data:
