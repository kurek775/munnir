@if (auth.currentUser()) {
  <nav class="bg-surface border-b border-elevated px-4 py-3" *transloco="let t">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <!-- Brand -->
      <div class="flex items-center gap-3">
        <img src="assets/logo.svg" alt="Munnir" class="h-7" />
        <span class="font-semibold text-text-primary text-sm tracking-wide">Munnir</span>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-3">
        <!-- Language toggle -->
        <div class="flex gap-1">
          <button
            class="px-2 py-1 text-xs font-medium rounded transition-colors"
            [class]="getActiveLang() === 'en'
              ? 'bg-accent text-gray-900'
              : 'bg-elevated text-text-secondary hover:text-text-primary'"
            (click)="switchLang('en')"
          >EN</button>
          <button
            class="px-2 py-1 text-xs font-medium rounded transition-colors"
            [class]="getActiveLang() === 'cs'
              ? 'bg-accent text-gray-900'
              : 'bg-elevated text-text-secondary hover:text-text-primary'"
            (click)="switchLang('cs')"
          >CS</button>
        </div>

        <!-- Theme toggle -->
        <button
          (click)="theme.toggle()"
          class="p-1.5 rounded-lg bg-elevated hover:bg-elevated/80 text-text-secondary hover:text-text-primary transition-colors"
          [title]="t('nav.theme')"
        >
          @if (theme.theme() === 'dark') {
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
            </svg>
          } @else {
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
            </svg>
          }
        </button>

        <!-- User menu -->
        <button
          (click)="auth.logout()"
          class="px-3 py-1.5 text-xs font-medium text-text-secondary hover:text-text-primary
                 bg-elevated rounded-lg transition-colors"
        >
          {{ t('nav.logout') }}
        </button>
      </div>
    </div>
  </nav>
}

<router-outlet />
